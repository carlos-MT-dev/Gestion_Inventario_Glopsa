<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Inventario</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    /* CONTENEDOR PRINCIPAL */
    .container {
      display: grid;
      grid-template-columns: 30% 70%;
      height: 100vh;
      width: 100vw;
    }

    /* PANEL IZQUIERDO (ROJO) */
    .left-panel {
      background: #e50914;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* LOGO */
    .brand {
      position: absolute;
      top: 70px;
      /* left: 300px; */
      color: #fff;
      font-size: 40px;
      font-weight: 600;
    }

    /* CARD LOGIN */
    .login-box {
      background: #f5f5f5;
      padding: 40px 30px;
      border-radius: 20px;
      width: 500px;
      height: 400px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
    }
    .title-login {
      margin-top:  20px;
     
      padding-bottom: 20px;
    }
    .login-box h2 {
      margin-bottom: 20px;
      font-weight: 600;
    }

    /* INPUTS */
    .input-group {
      margin-bottom: 15px;
    }

    .input-group input {
      width: 100%;
      padding: 12px 15px;
      border-radius: 10px;
      border: 1px solid #ccc;
      outline: none;
      font-size: 14px;
      transition: 0.3s;
    }

    .input-group input:focus {
      border-color: #e50914;
      box-shadow: 0 0 5px rgba(229,9,20,0.4);
    }

    /* BOTÓN */
    .btn-login {
      width: 100%;
      background: #0d2b5c;
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 25px;
      cursor: pointer;
      font-weight: 600;
      margin-top: 10px;
      transition: 0.3s;
    }

    .btn-login:hover {
      background: #081f40;
    }

    /* PANEL DERECHO (IMAGEN) */
    .right-panel {
      background: url('/USUARIOS/asset/Login-image-2.jpeg');
      background-size: cover;
      background-position: center;
      height: 100%;
      width: 100%;
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
      }

      .right-panel {
        display: none;
      }

      .left-panel {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- PANEL IZQUIERDO -->
    <div class="left-panel">
      
      <div class="brand">
        GLOPSA
      </div>
      
      <div class="login-box">
        <div class="title-login">
          <h2>Login</h2>
        </div>

        <form id="loginForm">
          
          <div class="input-group">
            <input type="text" id="user" placeholder="Usuario" required />
          </div>

          <div class="input-group">
            <input type="password" id="pass" placeholder="Contraseña" required />
          </div>

          <input type="checkbox" id="recordarme" hidden>

          <button class="btn-login" type="submit">
            Log In
          </button>

        </form>
      </div>

    </div>

    <!-- PANEL DERECHO -->
    <div class="right-panel"></div>

  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const data = {
        usuario: document.getElementById("user").value,
        contrasena: document.getElementById("pass").value,
        recordarme: document.getElementById("recordarme").checked
      };

      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        const result = await res.json();

        if (result.ok) {
          window.location.href = "/registro";
        } else {
          alert("Credenciales incorrectas");
        }
      } catch (err) {
        console.error("Error de red", err);
      }
    });
  </script>

</body>
</html>
