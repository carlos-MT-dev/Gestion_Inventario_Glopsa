
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Inventario</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: #fa0e0e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 950px;
      height: 530px;
      background: #fff;
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0px 0px 25px rgba(0,0,0,0.3);
    }

    /* LEFT IMAGE PANEL */
    .left-panel {
      background: url('/USUARIOS/asset/Login-image-2.jpeg'); /* Cambia por tu imagen */
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      width: 100%;
      height: 100%;
      position: relative;
    }

    .left-panel::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(0deg, rgba(0,0,0,0.5), transparent 70%);
    }

    .brand {
      position: absolute;
      top: 20px;
      left: 20px;
      display: flex;
      align-items: center;
      z-index: 10;
    }

    .brand h2 {
      color: #fff;
      margin-left: 10px;
    }

    .welcome-text {
      position: absolute;
      bottom: 20px;
      left: 20px;
      font-size: 22px;
      color: #fff;
      font-weight: 600;
      z-index: 10;
    }

    /* RIGHT PANEL */
    .right-panel {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 50px;
      align-items: center;
    }

    .right-panel h2 {
      font-size: 24px;
      margin-bottom: 20px;
    }

    .input-group {
      display: flex;
      align-items: center;
      background: #eee3ff;
      border-radius: 20px;
      padding: 10px 15px;
      margin-bottom: 18px;
    }

    .input-group input {
      border: none;
      outline: none;
      background: transparent;
      width: 100%;
      margin-left: 10px;
      font-size: 14px;
    }

    .remember {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .btn-login {
      background: #0d4b70;
      color: #fff;
      border: none;
      border-radius: 25px;
      padding: 10px 25px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn-login:hover {
      background: #09344f;
    }

  </style>
</head>
<body>

<div class="container">
  <div class="left-panel">
    <div class="brand">
      <!-- <img src="../asset/Login-image.jpg" width="45" /> -->
      <!-- <h2>GLOPSA</h2> -->
    </div>
    <!-- <div class="welcome-text">Bienvenido al Inventario General</div> -->
  </div>

  <div class="right-panel">
    <h2><span style="color:#d91d1d">Acces</span> Login</h2>

    <form id="loginForm">
      <div class="input-group">
        <span>👤</span>
        <input type="text" id="user" placeholder="Usuario" required />
      </div>

      <div class="input-group">
        <span>🔒</span>
        <input type="password" id="pass" placeholder="Contraseña" required />
      </div>

      <label class="remember">
        <input type="checkbox" id="recordarme" /  hidden> 
      </label>

      <button class="btn-login" type="submit" id="btn-login">LOGIN</button>
    </form>
  </div>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = {
    usuario: document.getElementById("user").value,
    contrasena: document.getElementById("pass").value,
    recordarme: document.getElementById("recordarme").checked
  };

  try {
    const res = await fetch("/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if (result.ok) {
      window.location.href = "/registro";
    } else {
      alert("Credenciales incorrectas");
    }
  } catch (err) {
    console.error("Error de red", err);
  }
});
</script>


</body>
</html>
