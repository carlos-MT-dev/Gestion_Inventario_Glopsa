<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Inventario</title>

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        min-height: 100vh;
        width: 100%;
      }

      /* CONTENEDOR PRINCIPAL */
      .container {
        display: grid;
        grid-template-columns: minmax(450px, 550px) 1fr;
        height: 100vh;
      }

      .left-panel {
        /* background: linear-gradient(180deg, #042b78 0%, #083694 100%); */
        background: #da0303;
        display: flex;
        justify-content: center;
        align-items: center;

        padding: clamp(20px, 3vw, 50px);
      }

      .login-container {
        width: 100%;
        max-width: 520px;
      }

      .company-header {
        text-align: center;
        margin-bottom: 35px;
      }

      .logo-circle {
        width: 80px;
        height: 80px;

        margin: auto;

        border-radius: 50%;

        background: linear-gradient(135deg, #4f2fe0, #7558ff);

        display: flex;
        justify-content: center;
        align-items: center;

        color: white;

        font-size: 34px;
        font-weight: 700;

        box-shadow: 0 15px 35px rgba(79, 47, 224, 0.35);
      }

      .company-header h1 {
        color: white;

        margin-top: 18px;

        font-size: 34px;
        font-weight: 700;

        letter-spacing: 1px;
      }

      .company-header p {
        color: rgba(255, 255, 255, 0.75);

        margin-top: 6px;

        font-size: 14px;
      }

      .login-box {
        width: 100%;
        max-width: 500px;
        /* background: rgba(255, 255, 255, 0.08); */
        background: white;
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 28px;
        padding: 45px;
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.2);
      }

      .title-login {
        text-align: center;

        margin-bottom: 35px;
      }

      .title-login h2 {
        color: #0b122d;

        font-size: 28px;

        margin-bottom: 8px;
      }

      .title-login span {
        color: #0b122d;

        font-size: 14px;
      }

      .input-group {
        margin-bottom: 22px;
      }

      .input-group label {
        display: block;

        margin-bottom: 8px;

        color: #0b122d;

        font-size: 14px;

        font-weight: 500;
      }

      .input-group input {
        width: 100%;

        height: 56px;

        border: none;

        border-radius: 14px;

        padding: 0 18px;

        background: #0b122d;

        font-size: 15px;

        transition: 0.25s;
      }

      .input-group input:focus {
        outline: none;

        box-shadow: 0 0 0 4px rgba(79, 47, 224, 0.25);
      }

      .btn-login {
        width: 100%;

        height: 58px;

        border: none;

        border-radius: 14px;

        cursor: pointer;

        background: linear-gradient(135deg, #1f00a7, #ff3131);

        color: white;

        font-size: 16px;

        font-weight: 600;

        transition: 0.25s;
      }

      .btn-login:hover {
        transform: translateY(-2px);

        box-shadow: 0 15px 30px rgba(211, 2, 2, 0.35);
      }

      @media (max-width: 1200px) {
        .container {
          grid-template-columns: 40% 60%;
        }
      }

      @media (max-width: 992px) {
        .container {
          grid-template-columns: 1fr;
        }

        .right-panel {
          display: none;
        }

        .left-panel {
          width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- PANEL IZQUIERDO -->
      <div class="left-panel">
        <div class="login-container">
          <div class="company-header">
            <div class="logo-circle">G</div>

            <h1>GLOPSA</h1>

            <p>Sistema de Gestión de Inventario</p>
          </div>

          <div class="login-box">
            <div class="title-login">
              <h2>Bienvenido</h2>
              <span>Ingrese sus credenciales para continuar</span>
            </div>

            <form id="loginForm">
              <div class="input-group">
                <label>Usuario</label>

                <input
                  type="text"
                  id="user"
                  placeholder="Ingrese su usuario"
                  required
                />
              </div>

              <div class="input-group">
                <label>Contraseña</label>

                <input
                  type="password"
                  id="pass"
                  placeholder="Ingrese su contraseña"
                  required
                />
              </div>

              <button class="btn-login" type="submit">
                Ingresar al Sistema
              </button>
            </form>
          </div>
        </div>
      </div>

      <!-- PANEL DERECHO -->
      <div class="right-panel">
        <img style="width: 100%; height:auto;" src="/modules/usuarios/public/assets/Login-image-2.jpeg" alt="">
      </div>
      <!-- <img src="../assets/Login-image-2.jpeg" alt=""> -->
    </div>

    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const data = {
            usuario: document.getElementById("user").value,
            contrasena: document.getElementById("pass").value,
            // recordarme: document.getElementById("recordarme").checked,
          };

          try {
            const res = await fetch("/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(data),
            });

            const result = await res.json();

            if (result.ok) {
              window.location.href = "/registro";
            } else {
              alert("Credenciales incorrectas");
            }
          } catch (err) {
            console.error("Error de red", err);
          }
        });
    </script>
  </body>
</html>
